<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitalisation - Clinique Refontiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="../assets/premium-style.css" rel="stylesheet">
    <link href="../assets/ai-assistant.css" rel="stylesheet">
    
    <script src="../assets/role-manager.js"></script>

    <style>
        .bed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 24px; }
        .bed-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; position: relative; cursor: pointer; box-shadow: var(--shadow); }
        .bed-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .bed-icon { font-size: 2rem; margin-bottom: 12px; }
        .bed-number { font-family: 'Space Grotesk'; font-weight: 700; font-size: 1.2rem; }
        .bed-status { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
        
        .status-libre { color: #22c55e; }
        .status-occupe { color: #ef4444; }
        .status-nettoyage { color: #f59e0b; }
        
        .bed-card.occupe { background: rgba(239, 68, 68, 0.03); border-color: rgba(239, 68, 68, 0.2); }
        .bed-card.libre { background: rgba(34, 197, 94, 0.03); border-color: rgba(34, 197, 94, 0.2); }
        .bed-card.nettoyage { background: rgba(245, 158, 11, 0.03); border-color: rgba(245, 158, 11, 0.2); }

        .patient-tag { background: var(--primary-light); color: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; margin-top: 10px; display: inline-block; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 32px; border-radius: 20px; width: 100%; max-width: 500px; }

        @media (max-width: 768px) {
            .bed-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
        <div id="sidebar-container"></div>

        <main class="main-content">
            

            <div class="top-bar">
                <div class="page-title">
                    <h1>Gestion des Lits</h1>
                    <p>Suivi en temps réel des patients en observation</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <div class="stat-mini" style="background: var(--card); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px;">
                        <div style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%;"></div>
                        <span id="stat-libre">15 Libres</span>
                    </div>
                    <div class="stat-mini" style="background: var(--card); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px;">
                        <div style="width: 8px; height: 8px; background: #ef4444; border-radius: 50%;"></div>
                        <span id="stat-occupe">5 Occupés</span>
                    </div>
                </div>
            </div>

            <div class="bed-grid" id="bed-grid">
                <!-- Lits générés dynamiquement -->
            </div>
        </main>
    </div>

    <!-- Modal Attribution Lit -->
    <div class="modal" id="bedModal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom:24px; font-family:'Space Grotesk';">Lit #01</h2>
            <form onsubmit="saveBedStatus(event)">
                <input type="hidden" id="current-bed-id">
                <div class="form-group">
                    <label>Statut du lit</label>
                    <select id="bed-status-select" onchange="togglePatientSelect()">
                        <option value="libre">Libre</option>
                        <option value="occupe">Occupé (Patient)</option>
                        <option value="nettoyage">En nettoyage</option>
                    </select>
                </div>
                <div class="form-group" id="patient-select-group" style="display:none;">
                    <label>Patient *</label>
                    <select id="bed-patient-id"></select>
                </div>
                <div class="form-group">
                    <label>Notes / Observations</label>
                    <textarea id="bed-notes" rows="3" placeholder="Ex: Surveillance post-op..."></textarea>
                </div>
                <div style="display:flex; gap:12px; margin-top:24px;">
                    <button type="button" class="btn" onclick="closeModal()" style="flex:1;">Annuler</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        let bedsData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadPatientsList();
            await loadBeds();
        });



        async function loadPatientsList() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data } = await supabase.from('patients').select('id, nom, prenom').order('nom');
            const select = document.getElementById('bed-patient-id');
            if (data) {
                select.innerHTML = '<option value="">Choisir un patient...</option>' + 
                    data.map(p => `<option value="${p.id}">${p.nom} ${p.prenom || ''}</option>`).join('');
            }
        }

        async function loadBeds() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data: hospitalisations } = await supabase.from('hospitalisations').select('*, patients(nom, prenom)').eq('actif', true);
            
            const grid = document.getElementById('bed-grid');
            grid.innerHTML = '';
            
            let libre = 0, occupe = 0, nettoyage = 0;
            
            for (let i = 1; i <= 20; i++) {
                const id = i.toString().padStart(2, '0');
                const hosp = hospitalisations ? hospitalisations.find(h => h.numero_lit == id) : null;
                
                // Utiliser le statut de la base de données, sinon 'libre' par défaut
                const status = hosp ? (hosp.statut || 'occupe') : 'libre';
                
                if (status === 'libre') libre++; 
                else if (status === 'occupe') occupe++;
                else nettoyage++;

                const card = document.createElement('div');
                card.className = `bed-card ${status}`;
                card.onclick = () => openBedModal(id, status, hosp);
                
                let statusLabel = 'Libre';
                if (status === 'occupe') statusLabel = 'Occupé';
                if (status === 'nettoyage') statusLabel = 'Nettoyage';

                card.innerHTML = `
                    <div class="bed-icon"><i class="fa-solid fa-bed"></i></div>
                    <div class="bed-number">Lit #${id}</div>
                    <div class="bed-status status-${status}">${statusLabel}</div>
                    ${hosp && hosp.patients ? `<div class="patient-tag">${hosp.patients.nom} ${hosp.patients.prenom || ''}</div>` : ''}
                `;
                grid.appendChild(card);
            }
            
            document.getElementById('stat-libre').textContent = `${libre} Libres`;
            document.getElementById('stat-occupe').textContent = `${occupe} Occupés`;
        }

        function openBedModal(id, status, hosp) {
            document.getElementById('modal-title').textContent = `Lit #${id}`;
            document.getElementById('current-bed-id').value = id;
            document.getElementById('bed-status-select').value = status;
            document.getElementById('bed-patient-id').value = hosp ? hosp.patient_id : '';
            document.getElementById('bed-notes').value = hosp ? hosp.notes : '';
            
            togglePatientSelect();
            document.getElementById('bedModal').classList.add('active');
        }

        function togglePatientSelect() {
            const status = document.getElementById('bed-status-select').value;
            document.getElementById('patient-select-group').style.display = status === 'occupe' ? 'block' : 'none';
        }

        function closeModal() {
            document.getElementById('bedModal').classList.remove('active');
        }

        async function saveBedStatus(e) {
            e.preventDefault();
            const id = document.getElementById('current-bed-id').value;
            const status = document.getElementById('bed-status-select').value;
            const patientId = document.getElementById('bed-patient-id').value;
            const notes = document.getElementById('bed-notes').value;
            
            const supabase = await window.SupabaseAPI.initSupabase();
            
            if (status === 'libre') {
                await supabase.from('hospitalisations').delete().eq('numero_lit', id);
                window.notifier("Lit " + id + " libéré.");
            } else {
                const payload = {
                    numero_lit: id,
                    statut: status,
                    notes: notes,
                    actif: true
                };
                
                if (status === 'occupe') {
                    if (!patientId) { window.notifier("Veuillez choisir un patient.", 'error'); return; }
                    payload.patient_id = patientId;
                } else {
                    payload.patient_id = null;
                }

                const { error } = await supabase.from('hospitalisations').upsert([payload], { onConflict: 'numero_lit' });
                
                if (error) window.notifier("Erreur : " + error.message, 'error');
                else window.notifier(status === 'nettoyage' ? "Lit " + id + " en nettoyage" : "Patient assigné au lit " + id);
            }
            
            closeModal();
            await loadBeds();
        }

        function toggleMobileSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>
