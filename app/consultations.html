<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultations - Refontiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="../assets/premium-style.css" rel="stylesheet">
    <link href="../assets/ai-assistant.css" rel="stylesheet">
    
    <script src="../assets/role-manager.js"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #ordonnance-print, #ordonnance-print * { visibility: visible; }
            #ordonnance-print { position: fixed; top: 0; left: 0; width: 100%; padding: 40px; }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="focus-mode-backdrop"></div>
            
            


            <div class="top-bar">
                <div class="page-title" style="display: flex; align-items: center; gap: 16px;">
                    <button onclick="goBack()" class="btn" style="background: var(--bg); color: var(--primary); border: 2px solid var(--border); padding: 10px 16px; font-size: 0.9rem;" title="Retour">
                        <i class="fa-solid fa-arrow-left"></i> Retour
                    </button>
                    <div>
                        <h1>Nouvelle Consultation</h1>
                        <p>Enregistrement d'une nouvelle visite</p>
                    </div>
                </div>
                <div class="top-actions">
                </div>
            </div>

            <!-- Info patient sélectionné -->
            <div id="selected-patient-info" style="display: none; margin-bottom: 20px; background: linear-gradient(135deg, var(--primary), #0ea5e9); border-radius: 16px; padding: 18px 24px; color: white; box-shadow: 0 6px 20px rgba(0, 119, 182, 0.2);">
                <div style="display: flex; align-items: center; gap: 14px;">
                    <div id="sp-avatar" style="width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; border: 2px solid rgba(255,255,255,0.3);">--</div>
                    <div>
                        <div style="font-size: 0.75rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px;">Patient sélectionné</div>
                        <div id="sp-name" style="font-size: 1.15rem; font-weight: 700; font-family: 'Space Grotesk';"></div>
                    </div>
                    <div style="margin-left: auto; text-align: right;">
                        <div style="font-size: 0.75rem; opacity: 0.7;">Date</div>
                        <div style="font-weight: 600;" id="sp-date"></div>
                    </div>
                </div>
            </div>

            <div class="card" style="max-width: 800px; margin: 0 auto; position: relative; z-index: 2000; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
                <form onsubmit="handleConsultation(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Choisir un Patient *</label>
                            <input list="patients-list" id="c-patient-search" class="form-control" placeholder="Taper le nom du patient..." required onchange="onPatientSearchChange()">
                            <datalist id="patients-list"></datalist>
                            <input type="hidden" id="c-patient">
                        </div>
                        <div class="form-group">
                            <label>Type de Consultation</label>
                            <select id="c-type">
                                <option value="Générale">Consultation Générale</option>
                                <option value="Suivi">Visite de suivi</option>
                                <option value="Urgence">Urgence</option>
                                <option value="Examen">Examen / Analyse</option>
                                <option value="Vaccination">Vaccination</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Symptômes décrits par le patient</label>
                        <textarea id="c-symptomes" rows="2" placeholder="Ex: Fièvre, maux de tête, toux sèche..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Diagnostic / Observations *</label>
                        <textarea id="c-diag" required placeholder="Décrivez les symptômes et le diagnostic..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Traitement / Prescription</label>
                        <textarea id="c-trait" placeholder="Médicaments prescrits, posologie, recommandations..."></textarea>
                    </div>

                    <!-- Catalogue des Interventions -->
                    <div style="margin-top: 32px; padding: 24px; background: var(--bg); border-radius: 16px; border: 1px solid var(--border);">
                        <h3 style="font-size: 1.1rem; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
                            <span><i class="fa-solid fa-file-invoice-dollar" style="color: var(--primary); margin-right: 8px;"></i> Catalogue des Interventions</span>
                            <span id="total-price" style="background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem;">0 FCFA</span>
                        </h3>
                        <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 20px;">Sélectionnez les actes réalisés pour générer automatiquement la facturation.</p>
                        
                        <div id="actes-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px;">
                            <p style="grid-column: 1 / -1; text-align: center; color: var(--text-light);">Chargement du catalogue...</p>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 16px; margin-top: 24px;">
                        <button type="button" class="btn" style="background: var(--bg); color: var(--text-light);" onclick="goBack()">Annuler</button>
                        <button type="submit" class="btn btn-primary" id="btn-save"><i class="fa-solid fa-save" style="margin-right: 6px;"></i>Enregistrer la consultation</button>
                    </div>
                </form>
            </div>

            <!-- Historique des dernières consultations -->
            <div class="card" style="max-width: 800px; margin: 24px auto 0; position: relative; z-index: 2000;">
                <div class="card-header">
                    <h3><i class="fa-solid fa-clock-rotate-left" style="margin-right: 8px; color: var(--primary);"></i>Dernières consultations</h3>
                </div>
                <div id="recent-consults">
                    <p style="color: var(--text-light); padding: 16px 0;">Chargement...</p>
                </div>
            </div>
            <!-- Zone Print Ordonnance (cachée jusqu'à la sauvegarde) -->
            <div id="ordonnance-print" style="display:none;"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        let allPatients = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await chargerPatients();
            await chargerActes();
            await chargerDernieresConsultations();
            
            // Si on vient d'un dossier patient, pré-sélectionner
            const urlParams = new URLSearchParams(window.location.search);
            const patientId = urlParams.get('patient_id');
            if (patientId) {
                document.getElementById('c-patient').value = patientId;
                onPatientChange();
            }
        });



        function goBack() {
            const urlParams = new URLSearchParams(window.location.search);
            const patientId = urlParams.get('patient_id');
            if (patientId) {
                window.location.href = `dossier-patient.html?id=${patientId}`;
            } else if (document.referrer && document.referrer.includes('refontiq-dashboard')) {
                history.back();
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        async function chargerPatients() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data: pts } = await supabase.from('patients').select('id, nom, prenom').order('nom');
            window.allPatients = pts || [];
            const list = document.getElementById('patients-list');
            if (pts) {
                list.innerHTML = pts.map(p => `<option value="${p.nom} ${p.prenom}">${p.id}</option>`).join('');
            }
        }

        function onPatientSearchChange() {
            const val = document.getElementById('c-patient-search').value;
            const p = window.allPatients.find(x => `${x.nom} ${x.prenom}` === val);
            if (p) {
                document.getElementById('c-patient').value = p.id;
                onPatientChange();
            }
        }

        function onPatientChange() {
            const pid = document.getElementById('c-patient').value;
            const infoBox = document.getElementById('selected-patient-info');
            if (!pid) { infoBox.style.display = 'none'; return; }

            const patient = allPatients.find(p => p.id === pid);
            if (patient) {
                infoBox.style.display = 'block';
                document.getElementById('sp-avatar').textContent = (patient.nom[0] + (patient.prenom ? patient.prenom[0] : '')).toUpperCase();
                document.getElementById('sp-name').textContent = `${patient.nom} ${patient.prenom || ''}`;
                document.getElementById('sp-date').textContent = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
            }
        }

        async function chargerDernieresConsultations() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data } = await supabase
                .from('consultations')
                .select('*, patients(nom, prenom, telephone)')
                .order('created_at', { ascending: false })
                .limit(5);

            const container = document.getElementById('recent-consults');
            if (!data || data.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light); padding: 16px 0; text-align: center;"><i class="fa-solid fa-inbox" style="margin-right: 8px;"></i>Aucune consultation enregistrée.</p>';
                return;
            }

            container.innerHTML = data.map(c => {
                const patientName = c.patients ? `${c.patients.nom} ${c.patients.prenom || ''}` : 'Patient inconnu';
                const dateStr = new Date(c.date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
                const heureStr = c.heure ? c.heure.substring(0, 5) : '';
                
                const statusClass = c.status === 'reception' ? 'status-planned' : 'status-ongoing';
                const statusText = c.status === 'reception' ? 'Attente Paiement' : 'Vers Infirmerie';
                const waMsg = encodeURIComponent(`Bonjour ${c.patients?.nom || ''}, votre dossier est prêt. Veuillez passer à la caisse pour régler vos frais.`);
                
                return `
                    <div style="display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s;" onmouseover="this.style.paddingLeft='8px'" onmouseout="this.style.paddingLeft='0'">
                        <div style="width: 42px; height: 42px; border-radius: 12px; background: ${c.status === 'termine' ? 'rgba(42, 157, 143, 0.1)' : 'rgba(245, 158, 11, 0.1)'}; color: ${c.status === 'termine' ? 'var(--secondary)' : 'var(--accent)'}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <i class="fa-solid ${c.status === 'termine' ? 'fa-check-circle' : 'fa-clock'}"></i>
                        </div>
                        <div style="flex: 1; min-width: 0;">
                            <div style="font-weight: 600; font-size: 0.9rem;">${patientName}</div>
                            <div style="font-size: 0.8rem; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.motif || 'Consultation'} — ${c.notes || '--'}</div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <a href="https://wa.me/${c.patients?.telephone?.replace(/\s/g,'')}?text=${waMsg}" target="_blank" class="btn" style="padding:6px; font-size:0.7rem; background:#25d366; color:white;"><i class="fa-brands fa-whatsapp"></i></a>
                        </div>
                        <div style="text-align: right; flex-shrink: 0;">
                            <div style="font-size: 0.8rem; font-weight: 600; color: var(--primary);">${dateStr}</div>
                            <div style="font-size: 0.75rem; color: var(--text-light);">${heureStr}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        let allActes = [];
        let selectedActes = [];

        async function chargerActes() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data } = await supabase.from('actes_medicaux').select('*').order('nom');
            const container = document.getElementById('actes-list');
            
            if (data) {
                allActes = data;
                container.innerHTML = data.map(a => `
                    <label class="acte-item" style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--card); border-radius: 12px; border: 1.5px solid var(--border); cursor: pointer; transition: 0.2s;">
                        <input type="checkbox" value="${a.id}" onchange="toggleActe('${a.id}')" style="width: 18px; height: 18px; cursor: pointer;">
                        <div style="flex: 1;">
                            <div style="font-size: 0.85rem; font-weight: 600; line-height: 1.2;">${a.nom}</div>
                            <div style="font-size: 0.75rem; color: var(--primary); font-weight: 700;">${a.prix.toLocaleString()} FCFA</div>
                        </div>
                    </label>
                `).join('');
            }
        }

        function toggleActe(id) {
            const index = selectedActes.indexOf(id);
            if (index > -1) selectedActes.splice(index, 1);
            else selectedActes.push(id);
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            selectedActes.forEach(id => {
                const acte = allActes.find(a => a.id == id);
                if (acte) total += acte.prix;
            });
            document.getElementById('total-price').textContent = total.toLocaleString() + ' FCFA';
        }

        async function handleConsultation(e) {
            e.preventDefault();
            const patientId = document.getElementById('c-patient').value;
            if (!patientId) {
                window.notifier("Veuillez sélectionner un patient", 'error');
                return;
            }

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin" style="margin-right: 6px;"></i>Enregistrement...';

            const supabase = await window.SupabaseAPI.initSupabase();
            const now = new Date();
            
            // 1. Enregistrer la consultation
            const consult = {
                patient_id: patientId,
                motif: document.getElementById('c-type').value,
                symptomes: document.getElementById('c-symptomes').value || null,
                notes: document.getElementById('c-diag').value,
                historique: document.getElementById('c-trait').value,
                date: now.toISOString().split('T')[0],
                heure: now.toTimeString().split(' ')[0].substring(0, 5),
                status: 'termine'
            };

            const { data: cData, error: cError } = await supabase.from('consultations').insert([consult]).select().single();
            
            if (cError) {
                window.notifier("Erreur : " + cError.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-save" style="margin-right: 6px;"></i>Enregistrer la consultation';
                return;
            }

            // 2. Facturation Automatique
            let totalFacture = 0;
            const detailsActes = [];
            selectedActes.forEach(id => {
                const acte = allActes.find(a => a.id == id);
                if (acte) {
                    totalFacture += acte.prix;
                    detailsActes.push(acte.nom);
                }
            });

            if (totalFacture > 0) {
                const paiement = {
                    patient_id: patientId,
                    montant: totalFacture,
                    type: 'Acte Médical',
                    motif: `Consultation + ${detailsActes.join(', ')}`,
                    statut: 'En attente'
                };
                await supabase.from('paiements').insert([paiement]);
            }

            // Sauvegarder les données pour l'impression
            window._lastConsultData = {
                patient: allPatients.find(p => p.id === patientId),
                diag: consult.notes,
                traitement: consult.historique,
                actes: detailsActes,
                total: totalFacture,
                date: new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' })
            };

            window.notifier("Consultation enregistrée !");

            // Afficher le bouton imprimer au lieu de rediriger immédiatement
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-save" style="margin-right: 6px;"></i>Enregistrer la consultation';
            
            // Bouton impression
            const actionZone = document.querySelector('.top-actions');
            if (actionZone) {
                actionZone.innerHTML = `
                    <button class="btn" style="background:#10b981; color:white; font-weight:700;" onclick="imprimerOrdonnance()">
                        <i class="fa-solid fa-print"></i> Imprimer l'Ordonnance
                    </button>
                    <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">
                        <i class="fa-solid fa-arrow-right"></i> Patient suivant
                    </button>
                `;
            }
        }

        function imprimerOrdonnance() {
            const d = window._lastConsultData;
            if (!d) return;
            const nom = d.patient ? `${d.patient.nom} ${d.patient.prenom || ''}` : 'Patient';
            document.getElementById('ordonnance-print').innerHTML = `
                <div style="font-family: Georgia, serif; max-width: 700px; margin: 0 auto;">
                    <div style="display:flex; justify-content:space-between; border-bottom:2px solid #0f172a; padding-bottom:16px; margin-bottom:24px;">
                        <div>
                            <div style="font-size:1.5rem; font-weight:700;">Clinique Médicale Eden</div>
                            <div style="color:#64748b; font-size:0.9rem;">Clinique Refontiq — Espace Médical</div>
                        </div>
                        <div style="text-align:right; font-size:0.85rem; color:#64748b;">
                            <div><strong>Date :</strong> ${d.date}</div>
                            <div><strong>N° Ordonnance :</strong> ${Date.now().toString().slice(-6)}</div>
                        </div>
                    </div>
                    <div style="margin-bottom:20px;">
                        <strong>Patient :</strong> ${nom}
                    </div>
                    <div style="margin-bottom:20px;">
                        <div style="font-weight:700; text-transform:uppercase; font-size:0.8rem; color:#64748b; margin-bottom:6px;">Diagnostic</div>
                        <div style="padding:12px; background:#f8fafc; border-left:3px solid #0f172a;">${d.diag || 'Voir dossier'}</div>
                    </div>
                    <div style="margin-bottom:24px;">
                        <div style="font-weight:700; text-transform:uppercase; font-size:0.8rem; color:#64748b; margin-bottom:6px;">Traitement prescrit</div>
                        <div style="padding:12px; background:#f8fafc; border-left:3px solid #10b981; white-space:pre-wrap;">${d.traitement || 'Aucun traitement prescrit'}</div>
                    </div>
                    ${d.actes.length > 0 ? `<div style="margin-bottom:24px;"><div style="font-weight:700; font-size:0.8rem; color:#64748b; margin-bottom:6px;">ACTES RÉALISÉS</div><ul>${d.actes.map(a => `<li>${a}</li>`).join('')}</ul><strong>Total : ${d.total.toLocaleString()} FCFA</strong></div>` : ''}
                    <div style="margin-top:60px; display:flex; justify-content:flex-end;">
                        <div style="text-align:center;">
                            <div style="width:150px; border-top:1px solid #0f172a; padding-top:8px; font-size:0.85rem;">Signature & Cachet</div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('ordonnance-print').style.display = 'block';
            window.print();
        }


    </script>
</body>
</html>
