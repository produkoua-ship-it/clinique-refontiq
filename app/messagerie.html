<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie Team - Refontiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../assets/premium-style.css" rel="stylesheet">
    <link href="../assets/ai-assistant.css" rel="stylesheet">
    
    <script src="../assets/role-manager.js"></script>
    <style>
        .chat-container { display: grid; grid-template-columns: 350px 1fr; height: calc(100vh - 100px); background: var(--card); border-radius: 24px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); margin-top: 20px; }
        
        /* Sidebar Contacts */
        .chat-sidebar { background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-search { padding: 20px; border-bottom: 1px solid var(--border); }
        .contact-list { flex: 1; overflow-y: auto; padding: 10px; }
        .contact-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .contact-item:hover { background: var(--primary-light); }
        .contact-item.active { background: var(--primary); color: white; }
        .contact-avatar { width: 45px; height: 45px; border-radius: 12px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .contact-item.active .contact-avatar { background: rgba(255,255,255,0.2); color: white; }
        .contact-info { flex: 1; overflow: hidden; }
        .contact-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
        .contact-status { font-size: 0.75rem; opacity: 0.7; }

        /* Main Chat Area */
        .chat-main { display: flex; flex-direction: column; background: var(--card); }
        .chat-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; background: var(--card); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; background: var(--bg); }
        
        /* Message Bubbles */
        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; position: relative; }
        .bubble.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.3); }
        .bubble.received { align-self: flex-start; background: var(--card); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .bubble-time { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        /* Chat Input */
        .chat-input-area { padding: 20px; border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 12px; align-items: center; }
        .chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 12px 20px; border-radius: 12px; color: var(--text); font-family: inherit; }
        .chat-input:focus { outline: none; border-color: var(--primary); }
        
        /* Responsive Mobile */
        @media (max-width: 900px) {
            .chat-container { grid-template-columns: 1fr; height: calc(100vh - 140px); border-radius: 0; margin-top: 0; }
            .chat-sidebar { display: flex; width: 100%; }
            .chat-sidebar.hidden { display: none; }
            .chat-main { display: none; width: 100%; }
            .chat-main.active { display: flex; position: fixed; top: 70px; left: 0; width: 100%; height: calc(100% - 70px); z-index: 1000; }
            .mobile-back-btn { display: block !important; }
            .top-bar { display: none; }
        }
        .mobile-back-btn { display: none; background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; padding-right: 10px; }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div id="sidebar-container"></div>

        <main class="main-content">
            

            <header class="top-bar">
                <div class="page-title">
                    <div style="display: flex; align-items: center;">
                            <a href="dashboard.html" class="mobile-back-header-btn" style="display: none; background: rgba(14, 165, 233, 0.1); color: var(--primary); width: 40px; height: 40px; border-radius: 12px; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0; margin-right: 12px;"><i class="fa-solid fa-arrow-left"></i></a>
                            <h1>Communication d'Équipe</h1>
                        </div>
                    <p>Discutez en temps réel avec vos collaborateurs</p>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="focusNewChat()"><i class="fa-solid fa-plus"></i> Nouveau Message</button>
                </div>
            </header>

            <div class="chat-container">
                <!-- Colonne Gauche : Contacts -->
                <div class="chat-sidebar">
                    <div class="sidebar-search">
                        <div class="search-wrapper">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" placeholder="Rechercher un collègue...">
                        </div>
                    </div>
                    <div class="contact-list" id="contact-list">
                        <!-- Les membres de l'équipe -->
                    </div>
                </div>

                <!-- Colonne Droite : Chat -->
                <div class="chat-main" id="chat-main" style="display: none;">
                    <div class="chat-header">
                        <button class="mobile-back-btn" onclick="backToContacts()"><i class="fa-solid fa-arrow-left"></i></button>
                        <div class="contact-avatar" id="active-chat-avatar">?</div>
                        <div class="contact-info">
                            <div class="contact-name" id="active-chat-name">Sélectionnez un contact</div>
                            <div class="contact-status">En ligne</div>
                        </div>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <!-- Les messages s'affichent ici -->
                    </div>
                    <form class="chat-input-area" onsubmit="handleSend(event)">
                        <input type="text" class="chat-input" id="chat-input" placeholder="Écrivez votre message..." autocomplete="off">
                        <button type="submit" class="btn btn-primary" style="border-radius: 12px; width: 45px; height: 45px; padding: 0; justify-content: center;">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>

                <!-- État Vide -->
                <div id="chat-empty" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); color: var(--text-light);">
                    <i class="fa-solid fa-comments" style="font-size: 4rem; margin-bottom: 20px; opacity: 0.2;"></i>
                    <p>Sélectionnez un collaborateur pour démarrer la discussion</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        let currentUser = null;
        let activeContactId = null;
        let allMessages = [];

        const teamMembers = [
            { id: 'medecin', name: 'Dr. Duval', role: 'Médecin Chef' },
            { id: 'infirmiere', name: 'Infirmière Martin', role: 'Soins Infirmiers' },
            { id: 'receptionniste', name: 'M. Koffi', role: 'Réception / Accueil' }
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            initUser();
            renderContacts();
            await chargerTousLesMessages();
            
            // Rafraîchissement automatique toutes les 5 secondes
            setInterval(() => chargerTousLesMessages(), 5000);
        });

        function initUser() {
            // RoleManager handles user info
        }

        function renderContacts() {
            const list = document.getElementById('contact-list');
            list.innerHTML = teamMembers
                .filter(m => m.id !== currentUser?.role) // Ne pas se voir soi-même
                .map(m => `
                    <div class="contact-item" id="contact-${m.id}" onclick="selectContact('${m.id}')">
                        <div class="contact-avatar">${m.name.substring(0,2).toUpperCase()}</div>
                        <div class="contact-info">
                            <div class="contact-name">${m.name}</div>
                            <div class="contact-status">${m.role}</div>
                        </div>
                    </div>
                `).join('');
        }

        function focusNewChat() {
            const sidebar = document.querySelector('.chat-sidebar');
            sidebar.style.boxShadow = '0 0 20px var(--primary)';
            setTimeout(() => sidebar.style.boxShadow = 'none', 1000);
            document.querySelector('.chat-input').focus();
            window.notifier && window.notifier("Sélectionnez un collègue dans la liste de gauche", "info");
        }

        async function selectContact(id) {
            activeContactId = id;
            const contact = teamMembers.find(m => m.id === id);
            
            // UI Updates
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`contact-${id}`).classList.add('active');
            
            document.getElementById('chat-empty').style.display = 'none';
            const chatMain = document.getElementById('chat-main');
            chatMain.style.display = 'flex';
            chatMain.classList.add('active');
            
            document.querySelector('.chat-sidebar').classList.add('hidden');
            
            document.getElementById('active-chat-name').textContent = contact.name;
            document.getElementById('active-chat-avatar').textContent = contact.name.substring(0,2).toUpperCase();
            
            renderMessages();
        }

        function backToContacts() {
            document.getElementById('chat-main').classList.remove('active');
            document.querySelector('.chat-sidebar').classList.remove('hidden');
            activeContactId = null;
        }

        function toggleMobileSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }

        async function chargerTousLesMessages() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data, error } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (!error && data) {
                allMessages = data;
                if (activeContactId) renderMessages();
            }
        }

        function renderMessages() {
            const container = document.getElementById('chat-messages');
            const filtered = allMessages.filter(m => 
                (m.expediteur_id === currentUser.role && m.destinataire_id === activeContactId) ||
                (m.expediteur_id === activeContactId && m.destinataire_id === currentUser.role)
            );

            container.innerHTML = filtered.map(m => {
                const isSent = m.expediteur_id === currentUser.role;
                return `
                    <div class="bubble ${isSent ? 'sent' : 'received'}">
                        ${m.contenu}
                        <span class="bubble-time">${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        async function handleSend(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !activeContactId) return;

            input.value = '';
            
            const supabase = await window.SupabaseAPI.initSupabase();
            const msg = {
                expediteur_id: currentUser.role,
                destinataire_id: activeContactId,
                contenu: text,
                est_lu: false
            };

            const { error } = await supabase.from('messages').insert([msg]);
            if (!error) {
                await chargerTousLesMessages();
            }
        }
    </script>

        <!-- ── BOTTOM NAVIGATION MOBILE ── -->
        <nav class="mobile-bottom-nav" style="display: none;">
            <a href="dashboard.html" class="mobile-nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Accueil</span>
            </a>
            <a href="patients.html" class="mobile-nav-item">
                <i class="fa-solid fa-users"></i>
                <span>Patients</span>
            </a>
            <button class="mobile-nav-item more-btn" onclick="toggleQuickActions()">
                <i class="fa-solid fa-plus"></i>
            </button>
            <a href="rendez-vous.html" class="mobile-nav-item">
                <i class="fa-solid fa-calendar"></i>
                <span>RDV</span>
            </a>
            <a href="parametres.html" class="mobile-nav-item">
                <i class="fa-solid fa-gear"></i>
                <span>Profil</span>
            </a>
        </nav>

        <!-- ── QUICK ACTIONS OVERLAY MOBILE ── -->
        <div class="mobile-quick-overlay" id="quickOverlay" onclick="toggleQuickActions()"></div>
        <div class="mobile-quick-actions" id="quickActionsPopup">
            <h3 style="font-family: 'Space Grotesk'; margin-bottom: 20px; text-align: center;">Actions Rapides</h3>
            <div class="quick-actions-grid">
                <a href="consultations.html" class="quick-action-item">
                    <i class="fa-solid fa-file-medical"></i>
                    <span>Consultation</span>
                </a>
                <a href="patients.html?action=new" class="quick-action-item">
                    <i class="fa-solid fa-user-plus"></i>
                    <span>Patient</span>
                </a>
                <a href="rendez-vous.html" class="quick-action-item">
                    <i class="fa-solid fa-calendar-plus"></i>
                    <span>Prendre RDV</span>
                </a>
                <a href="vitals-tablet.html" class="quick-action-item">
                    <i class="fa-solid fa-heart-pulse"></i>
                    <span>Constantes</span>
                </a>
                <a href="stocks.html" class="quick-action-item">
                    <i class="fa-solid fa-box-open"></i>
                    <span>Stocks</span>
                </a>
                <a href="finance.html" class="quick-action-item">
                    <i class="fa-solid fa-coins"></i>
                    <span>Caisse</span>
                </a>
            </div>
        </div>

</body>
</html>
