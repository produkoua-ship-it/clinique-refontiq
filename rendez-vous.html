<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médical - Refontiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css' rel='stylesheet' />
    
    <link href="assets/premium-style.css" rel="stylesheet">
    <style>
        body { overflow: hidden; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        .calendar-section { background: var(--card); border-right: 1px solid var(--border); padding: 24px; overflow-y: auto; }
        .mini-calendar-container { margin-bottom: 32px; }
        #mini-calendar { font-size: 0.85rem; }
        .fc .fc-toolbar-title { font-size: 1rem !important; font-weight: 700; }
        .fc .fc-button { padding: 4px 8px !important; font-size: 0.8rem !important; }
        .agenda-section { padding: 32px; overflow-y: auto; background: var(--bg); }
        .agenda-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; gap: 16px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 10px; gap: 16px; }
        .agenda-date h2 { font-family: 'Space Grotesk'; font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .rdv-list { display: flex; flex-direction: column; gap: 16px; }
        .rdv-item { background: var(--card); padding: 20px; border-radius: 16px; display: flex; align-items: center; gap: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: 0.2s; }
        .rdv-item:hover { transform: translateX(10px); border-color: var(--primary); }
        .rdv-time { min-width: 80px; font-weight: 700; font-size: 1.1rem; color: var(--primary); text-align: center; border-right: 2px solid var(--primary-light); }
        .patient-info { flex: 1; }
        .patient-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
        .rdv-reason { font-size: 0.85rem; color: var(--text-light); display: flex; align-items: center; gap: 6px; }
        .status-confirmed { background: rgba(42, 157, 143, 0.1); color: var(--secondary); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 32px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        @media (max-width: 1024px) {
            .main-content { display: block; padding: 16px; }
            .calendar-section { display: none; }
            .agenda-header, .calendar-header { flex-direction: column; align-items: stretch; margin-bottom: 24px; }
            .agenda-header > div:last-child, .calendar-actions { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-hospital"></i></div>
                    <div class="logo-text"><h1>Clinique Refontiq</h1><p>Espace Médical</p></div>
                </div>

                <div class="sidebar-search">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Rechercher un patient...">
                    </div>
                </div>

                <div class="user-info">
                    <div class="user-avatar" id="side-avatar">DR</div>
                    <div class="user-details"><h3 id="side-name">Dr. Duval <span class="online-indicator" style="margin-left: 5px;"></span></h3><p id="side-role">Médecin</p></div>
                </div>
            </div>
            <nav class="nav-menu">

                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line glass-icon"></i> Dashboard</a>
                <a href="patients.html" class="nav-item"><i class="fa-solid fa-users glass-icon"></i> Patients</a>
                <a href="consultations.html" class="nav-item"><i class="fa-solid fa-stethoscope glass-icon"></i> Consultations</a>
                <a href="rendez-vous.html" class="nav-item active"><i class="fa-solid fa-calendar-check glass-icon"></i> Rendez-vous</a>
                
                <hr class="nav-separator">
                
                <a href="finance.html" class="nav-item"><i class="fa-solid fa-coins glass-icon"></i> Finance</a>
                <a href="stocks.html" class="nav-item"><i class="fa-solid fa-boxes-stacked glass-icon"></i> Stocks</a>
                
                <hr class="nav-separator">
                
                <a href="messagerie.html" class="nav-item"><i class="fa-solid fa-comments glass-icon"></i> Messagerie</a>
                <a href="alertes.html" class="nav-item"><i class="fa-solid fa-bell glass-icon"></i> Alertes</a>
                <a href="parametres.html" class="nav-item"><i class="fa-solid fa-cog glass-icon"></i> Paramètres</a>
            
            </nav>
        </aside>

        <main class="main-content">
            <header class="mobile-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="header-btn" onclick="toggleMobileSidebar()" style="background:none; border:none; font-size:1.5rem; color:white; cursor:pointer;"><i class="fa-solid fa-bars"></i></button>
                    <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.2); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;">
                        <i class="fa-solid fa-hospital"></i>
                    </div>
                    <div style="font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px;">Clinique Refontiq</div>
                </div>
                <div style="font-size: 0.7rem; font-weight: 800; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 8px; text-transform: uppercase;">Agenda</div>
            </header>

            <section class="calendar-section">
                <div class="mini-calendar-container">
                    <div id="mini-calendar"></div>
                </div>
                <div style="margin-top: 24px;">
                    <h3 style="font-size: 0.9rem; margin-bottom: 16px; color: var(--text-light);">Légende</h3>
                    <div style="display:flex; flex-direction:column; gap:10px; font-size:0.8rem;">
                        <div style="display:flex; align-items:center; gap:8px;"><div style="width:12px; height:12px; border-radius:3px; background:var(--primary);"></div> Consultation</div>
                        <div style="display:flex; align-items:center; gap:8px;"><div style="width:12px; height:12px; border-radius:3px; background:var(--secondary);"></div> Examen</div>
                        <div style="display:flex; align-items:center; gap:8px;"><div style="width:12px; height:12px; border-radius:3px; background:var(--danger);"></div> Urgence</div>
                    </div>
                </div>
            </section>

            <section class="agenda-section">
                <div class="agenda-header" style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="agenda-date">
                        <p id="day-name" style="text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: var(--text-light); font-size: 0.8rem; margin:0;">AUJOURD'HUI</p>
                        <h2 id="current-date-display" style="margin:0; font-size: 1.8rem; font-family:'Space Grotesk';">Chargement...</h2>
                    </div>
                    <div class="header-actions" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; width: 100%;">
                        <input type="date" id="jump-to-date" onchange="jumpToDate(this.value)" style="padding: 12px; border-radius: 10px; border: 2px solid var(--border); font-family: inherit; width: 100%;">
                        <button class="btn" onclick="chargerAvenir()" style="background: var(--primary-light); color: var(--primary); justify-content: center; width: 100%;"><i class="fa-solid fa-forward"></i> 7 Jours</button>
                        <button class="btn btn-primary" onclick="openModal()" style="justify-content: center; width: 100%;"><i class="fa-solid fa-plus"></i> Nouveau RDV</button>
                    </div>
                </div>

                <div id="rdv-loader" style="text-align: center; padding: 60px; display: none;">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
                </div>

                <div class="rdv-list" id="rdv-list-container">
                    <!-- Les RDV s'afficheront ici -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Nouveau RDV -->
    <div class="modal" id="rdvModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 24px; font-family: 'Space Grotesk';">Programmer un rendez-vous</h2>
            <form onsubmit="handleSaveRDV(event)">
                <div class="form-group">
                    <label>Patient *</label>
                    <select id="select-patient" required><option value="">Sélectionner un patient...</option></select>
                </div>
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div><label>Date *</label><input type="date" id="rdv-date" required></div>
                    <div><label>Heure *</label><input type="time" id="rdv-time" required></div>
                </div>
                <div class="form-group">
                    <label>Type de visite</label>
                    <select id="rdv-type">
                        <option value="consultation">Consultation Générale</option>
                        <option value="bilan">Examen / Analyse</option>
                        <option value="urgence">Urgence</option>
                        <option value="suivi">Visite de suivi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Motif précis (Optionnel)</label>
                    <input type="text" id="rdv-motif" placeholder="Ex: Douleurs au genou...">
                </div>
                <div style="display: flex; gap: 12px; margin-top: 32px;">
                    <button type="button" class="btn" style="flex:1;" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;" id="btn-save">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        let calendar;
        let selectedDate = new Date().toISOString().split('T')[0];

        document.addEventListener('DOMContentLoaded', async () => {
            initUser();
            initMiniCalendar();
            updateDateDisplay(new Date());
            await chargerPatients();
            await chargerRDV(selectedDate);
        });

        function initUser() {
            const u = localStorage.getItem('currentUser');
            if (u) {
                const user = JSON.parse(u);
                document.getElementById('side-name').textContent = user.name || 'Utilisateur';
                document.getElementById('side-role').textContent = user.role;
                document.getElementById('side-avatar').textContent = (user.name || 'U').substring(0, 2).toUpperCase();
            }
        }

        function initMiniCalendar() {
            const calendarEl = document.getElementById('mini-calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'fr',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                height: 'auto',
                dateClick: function(info) {
                    selectedDate = info.dateStr;
                    updateDateDisplay(info.date);
                    chargerRDV(selectedDate);
                }
            });
            calendar.render();
        }

        function updateDateDisplay(date) {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('current-date-display').textContent = date.toLocaleDateString('fr-FR', options);
            const isToday = new Date().toISOString().split('T')[0] === date.toISOString().split('T')[0];
            document.getElementById('day-name').textContent = isToday ? "AUJOURD'HUI" : date.toLocaleDateString('fr-FR', { weekday: 'long' });
            document.getElementById('rdv-date').value = date.toISOString().split('T')[0];
        }

        async function chargerPatients() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data } = await supabase.from('patients').select('id, nom, prenom').order('nom');
            const select = document.getElementById('select-patient');
            if (data) data.forEach(p => select.innerHTML += `<option value="${p.id}">${p.nom} ${p.prenom || ''}</option>`);
        }

        function jumpToDate(dateStr) {
            if (!dateStr) return;
            selectedDate = dateStr;
            const dateObj = new Date(dateStr);
            calendar.gotoDate(dateObj);
            updateDateDisplay(dateObj);
            chargerRDV(selectedDate);
        }

        async function chargerAvenir() {
            const loader = document.getElementById('rdv-loader');
            const container = document.getElementById('rdv-list-container');
            loader.style.display = 'block';
            container.innerHTML = '';
            
            document.getElementById('current-date-display').textContent = "7 Prochains jours";
            document.getElementById('day-name').textContent = "APERÃ‡U";

            const supabase = await window.SupabaseAPI.initSupabase();
            const today = new Date().toISOString().split('T')[0];
            const nextWeek = new Date();
            nextWeek.setDate(nextWeek.getDate() + 7);
            const nextWeekStr = nextWeek.toISOString().split('T')[0];

            const { data } = await supabase
                .from('rendez_vous')
                .select('*, patients(nom, prenom)')
                .gte('date', today)
                .lte('date', nextWeekStr)
                .order('date', { ascending: true })
                .order('heure', { ascending: true });

            loader.style.display = 'none';

            if (!data || data.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px;">Aucun RDV prévu dans les 7 prochains jours.</div>`;
                return;
            }

            container.innerHTML = data.map(r => `
                <div class="rdv-item">
                    <div class="rdv-time" style="font-size:0.8rem; line-height:1.2;">
                        ${new Date(r.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'})}<br>
                        <strong>${r.heure.substring(0,5)}</strong>
                    </div>
                    <div class="patient-info">
                        <div class="patient-name">${r.patients?.nom} ${r.patients?.prenom || ''}</div>
                        <div class="rdv-reason"><i class="fa-solid fa-tag"></i> ${r.motif || 'Consultation'}</div>
                    </div>
                    <div class="status status-confirmed">Confirmé</div>
                </div>
            `).join('');
        }

        async function chargerRDV(date) {
            const loader = document.getElementById('rdv-loader');
            const container = document.getElementById('rdv-list-container');
            loader.style.display = 'block';
            container.innerHTML = '';

            const supabase = await window.SupabaseAPI.initSupabase();
            const { data, error } = await supabase
                .from('rendez_vous')
                .select('*, patients(id, nom, prenom)')
                .eq('date', date)
                .order('heure', { ascending: true });

            loader.style.display = 'none';

            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px; background:white; border-radius:16px; color:var(--text-light); border:1px dashed var(--border);">
                        <i class="fa-solid fa-calendar-day fa-3x" style="opacity:0.2; margin-bottom:16px;"></i>
                        <p>Aucun rendez-vous pour cette journée.</p>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(r => `
                <div class="rdv-item" onclick="window.location.href='dossier-patient.html?id=${r.patients?.id}'" style="cursor:pointer;">
                    <div class="rdv-time">${r.heure.substring(0,5)}</div>
                    <div class="patient-info">
                        <div class="patient-name">${r.patients?.nom} ${r.patients?.prenom || ''}</div>
                        <div class="rdv-reason">
                            <i class="fa-solid fa-tag" style="color:var(--primary);"></i>
                            ${r.motif || 'Consultation'}
                        </div>
                    </div>
                    <div class="status status-confirmed">Confirmé</div>
                    <button onclick="event.stopPropagation(); deleteRDV('${r.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; opacity:0.3; transition:0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.3">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        async function handleSaveRDV(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.textContent = "Enregistrement...";

            const supabase = await window.SupabaseAPI.initSupabase();
            const rdv = {
                patient_id: document.getElementById('select-patient').value,
                date: document.getElementById('rdv-date').value,
                heure: document.getElementById('rdv-time').value,
                motif: document.getElementById('rdv-type').options[document.getElementById('rdv-type').selectedIndex].text,
                notes: document.getElementById('rdv-motif').value || null
            };

            const { error } = await supabase.from('rendez_vous').insert([rdv]);
            if (!error) {
                closeModal();
                await chargerRDV(selectedDate);
                window.notifier("Rendez-vous enregistré !");
            } else window.notifier("Erreur : " + error.message, 'error');
            
            btn.disabled = false;
            btn.textContent = "Enregistrer";
        }

        async function deleteRDV(id) {
            if (!confirm("Supprimer ce rendez-vous ?")) return;
            const supabase = await window.SupabaseAPI.initSupabase();
            await supabase.from('rendez_vous').delete().eq('id', id);
            await chargerRDV(selectedDate);
        }

        function openModal() { document.getElementById('rdvModal').classList.add('active'); }
        function closeModal() { document.getElementById('rdvModal').classList.remove('active'); }

        function toggleMobileSidebar() {
            const s = document.querySelector('.sidebar');
            const o = document.getElementById('sidebarOverlay');
            s.classList.toggle('active');
            o.classList.toggle('active');
        }
    </script>
</body>
</html>
