<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaire - Refontiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="assets/premium-style.css" rel="stylesheet">
    <style>
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 32px; border-radius: 20px; width: 100%; max-width: 500px; }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-hospital"></i></div>
                    <div class="logo-text"><h1>Clinique Refontiq</h1><p>Espace Médical</p></div>
                </div>

                <div class="sidebar-search">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Rechercher un patient...">
                    </div>
                </div>

                <div class="user-info">
                    <div class="user-avatar" id="side-avatar">DR</div>
                    <div class="user-details"><h3 id="side-name">Dr. Duval <span class="online-indicator" style="margin-left: 5px;"></span></h3><p id="side-role">Médecin</p></div>
                </div>
            </div>
            <nav class="nav-menu">

                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line glass-icon"></i> Dashboard</a>
                <a href="patients.html" class="nav-item"><i class="fa-solid fa-users glass-icon"></i> Patients</a>
                <a href="consultations.html" class="nav-item"><i class="fa-solid fa-stethoscope glass-icon"></i> Consultations</a>
                <a href="rendez-vous.html" class="nav-item"><i class="fa-solid fa-calendar-check glass-icon"></i> Rendez-vous</a>
                
                <hr class="nav-separator">
                
                <a href="finance.html" class="nav-item"><i class="fa-solid fa-coins glass-icon"></i> Finance</a>
                <a href="stocks.html" class="nav-item active"><i class="fa-solid fa-boxes-stacked glass-icon"></i> Stocks</a>
                
                <hr class="nav-separator">
                
                <a href="messagerie.html" class="nav-item"><i class="fa-solid fa-comments glass-icon"></i> Messagerie</a>
                <a href="alertes.html" class="nav-item"><i class="fa-solid fa-bell glass-icon"></i> Alertes</a>
                <a href="parametres.html" class="nav-item"><i class="fa-solid fa-cog glass-icon"></i> Paramètres</a>
            
            </nav>
        </aside>

        <main class="main-content">
            <header class="mobile-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="header-btn" onclick="toggleMobileSidebar()" style="background:none; border:none; font-size:1.5rem; color:white; cursor:pointer;"><i class="fa-solid fa-bars"></i></button>
                    <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.2); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;">
                        <i class="fa-solid fa-hospital"></i>
                    </div>
                    <div style="font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px;">Clinique Refontiq</div>
                </div>
                <div style="font-size: 0.7rem; font-weight: 800; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 8px; text-transform: uppercase;">Stocks</div>
            </header>


            <div class="top-bar">
                <div class="page-title">
                    <h1>Gestion des Stocks</h1>
                    <p>Inventaire du matériel et des médicaments</p>
                </div>
                <div style="display: flex; gap: 16px; align-items: center;">
                    <div class="search-box" style="position: relative;">
                        <i class="fa-solid fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                        <input type="text" id="search-stock" placeholder="Rechercher un produit..." onkeyup="filtrerStocks()" style="padding: 10px 12px 10px 36px; border-radius: 10px; border: 2px solid var(--border); width: 250px;">
                    </div>
                    <button class="btn btn-primary" onclick="toggleModal(true)"><i class="fa-solid fa-plus"></i> Nouveau Produit</button>
                </div>
            </div>

            <div class="card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Produit</th>
                                <th>Catégorie</th>
                                <th>Quantité</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stock-list">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 60px;">
                                    <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Stock -->
    <div class="modal" id="stockModal">
        <div class="modal-content">
            <h2 style="margin-bottom:24px; font-family:'Space Grotesk';">Ajouter un produit</h2>
            <form onsubmit="handleSaveStock(event)">
                <div class="form-group">
                    <label>Nom du produit *</label>
                    <input type="text" id="s-nom" required>
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="s-cat">
                        <option value="Médicament">Médicament</option>
                        <option value="Matériel">Matériel</option>
                        <option value="Consommable">Consommable</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantité initiale *</label>
                    <input type="number" id="s-qty" required>
                </div>
                <div style="display:flex; gap:12px; margin-top:24px;">
                    <button type="button" class="btn" onclick="toggleModal(false)" style="flex:1;">Annuler</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;" id="btn-save">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initUser();
            await chargerStocks();
        });

        function initUser() {
            const u = localStorage.getItem('currentUser');
            if (u) {
                const user = JSON.parse(u);
                document.getElementById('side-name').textContent = user.name || 'Utilisateur';
                document.getElementById('side-role').textContent = user.role;
                document.getElementById('side-avatar').textContent = (user.name || 'U').substring(0, 2).toUpperCase();
            }
        }

        async function chargerStocks() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data } = await supabase.from('stocks').select('*').order('produit');
            window.allStocks = data; // Garder en mémoire pour le filtrage
            afficherStocks(data);
        }

        function afficherStocks(stocks) {
            const list = document.getElementById('stock-list');
            if (!stocks || stocks.length === 0) {
                list.innerHTML = `<tr><td colspan="5" style="padding: 0;">
                    <div class="empty-state">
                        <i class="fa-solid fa-box-open empty-state-icon"></i>
                        <h3 style="font-family:'Space Grotesk'; font-size: 1.4rem; margin-bottom: 8px;">Tout est en ordre !</h3>
                        <p>Votre inventaire est à jour. Besoin de réapprovisionner un produit manquant ou d'ajouter une nouvelle référence ?</p>
                        <button class="btn btn-primary" onclick="toggleModal(true)"><i class="fa-solid fa-plus"></i> Nouvelle commande</button>
                    </div>
                </td></tr>`;
                return;
            }

            list.innerHTML = stocks.map(s => `
                <tr>
                    <td style="font-weight:700;">${s.produit}</td>
                    <td>${s.categorie || 'N/A'}</td>
                    <td style="font-weight:700;">${s.quantite}</td>
                    <td><span class="stock-badge ${s.quantite < 10 ? 'stock-low' : 'stock-ok'}">${s.quantite < 10 ? 'Faible' : 'En stock'}</span></td>
                    <td>
                        <button onclick="modifierQty('${s.id}', ${s.quantite + 1})" class="btn" style="padding:4px 8px; font-size:0.8rem; background:var(--primary-light); color:var(--primary);">+</button>
                        <button onclick="modifierQty('${s.id}', ${s.quantite - 1})" class="btn" style="padding:4px 8px; font-size:0.8rem; background:var(--bg); color:var(--danger);">-</button>
                    </td>
                </tr>
            `).join('');
        }

        function filtrerStocks() {
            const query = document.getElementById('search-stock').value.toLowerCase();
            const filtered = window.allStocks.filter(s => s.produit.toLowerCase().includes(query) || (s.categorie && s.categorie.toLowerCase().includes(query)));
            afficherStocks(filtered);
        }

        async function handleSaveStock(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            
            const supabase = await window.SupabaseAPI.initSupabase();
            const prod = {
                produit: document.getElementById('s-nom').value,
                categorie: document.getElementById('s-cat').value,
                quantite: parseInt(document.getElementById('s-qty').value),
                seuil_alerte: 10
            };

            const { error } = await supabase.from('stocks').insert([prod]);
            if (!error) {
                toggleModal(false);
                await chargerStocks();
            }
            btn.disabled = false;
        }

        async function modifierQty(id, val) {
            const supabase = await window.SupabaseAPI.initSupabase();
            await supabase.from('stocks').update({ quantite: val }).eq('id', id);
            await chargerStocks();
        }

        function toggleModal(show) { document.getElementById('stockModal').classList.toggle('active', show); }

        function toggleMobileSidebar() {
            const s = document.querySelector('.sidebar');
            const o = document.getElementById('sidebarOverlay');
            s.classList.toggle('active');
            o.classList.toggle('active');
        }
    </script>
</body>
</html>
