<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertes - Refontiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="assets/premium-style.css" rel="stylesheet">
    <style>
        .alert-card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px; display: flex; align-items: center; gap: 20px; border-left: 5px solid var(--danger); transition: 0.2s; }
        .alert-card:hover { transform: translateX(8px); }
        .alert-icon { width: 50px; height: 50px; border-radius: 12px; background: rgba(231, 111, 81, 0.1); color: var(--danger); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 700; margin-bottom: 4px; }
        .alert-desc { font-size: 0.85rem; color: var(--text-light); }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-hospital"></i></div>
                    <div class="logo-text"><h1>Clinique Refontiq</h1><p>Espace Médical</p></div>
                </div>

                <div class="sidebar-search">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Rechercher un patient...">
                    </div>
                </div>

                <div class="user-info">
                    <div class="user-avatar" id="side-avatar">DR</div>
                    <div class="user-details"><h3 id="side-name">Dr. Duval <span class="online-indicator" style="margin-left: 5px;"></span></h3><p id="side-role">Médecin</p></div>
                </div>
            </div>
            <nav class="nav-menu">

                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line glass-icon"></i> Dashboard</a>
                <a href="patients.html" class="nav-item"><i class="fa-solid fa-users glass-icon"></i> Patients</a>
                <a href="consultations.html" class="nav-item"><i class="fa-solid fa-stethoscope glass-icon"></i> Consultations</a>
                <a href="rendez-vous.html" class="nav-item"><i class="fa-solid fa-calendar-check glass-icon"></i> Rendez-vous</a>
                
                <hr class="nav-separator">
                
                <a href="finance.html" class="nav-item"><i class="fa-solid fa-coins glass-icon"></i> Finance</a>
                <a href="stocks.html" class="nav-item"><i class="fa-solid fa-boxes-stacked glass-icon"></i> Stocks</a>
                
                <hr class="nav-separator">
                
                <a href="messagerie.html" class="nav-item"><i class="fa-solid fa-comments glass-icon"></i> Messagerie</a>
                <a href="alertes.html" class="nav-item active"><i class="fa-solid fa-bell glass-icon"></i> Alertes</a>
                <a href="parametres.html" class="nav-item"><i class="fa-solid fa-cog glass-icon"></i> Paramètres</a>
            
            </nav>
        </aside>

        <main class="main-content">
            <header class="mobile-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="header-btn" onclick="toggleMobileSidebar()" style="background:none; border:none; font-size:1.5rem; color:white; cursor:pointer;"><i class="fa-solid fa-bars"></i></button>
                    <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.2); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;">
                        <i class="fa-solid fa-hospital"></i>
                    </div>
                    <div style="font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px;">Clinique Refontiq</div>
                </div>
                <div style="font-size: 0.7rem; font-weight: 800; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 8px; text-transform: uppercase;">Alertes</div>
            </header>


            <div class="top-bar">
                <div class="page-title">
                    <h1>Centre d'Alertes</h1>
                    <p>Surveillez les points critiques de la clinique</p>
                </div>
            </div>

            <div id="alert-list">
                <div style="text-align: center; padding: 60px;">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
                    <p style="margin-top: 15px; color: var(--text-light);">Analyse des données en cours...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initUser();
            await chargerAlertes();
        });

        function initUser() {
            const u = localStorage.getItem('currentUser');
            if (u) {
                const user = JSON.parse(u);
                document.getElementById('side-name').textContent = user.name || 'Utilisateur';
                document.getElementById('side-role').textContent = user.role;
                document.getElementById('side-avatar').textContent = (user.name || 'U').substring(0, 2).toUpperCase();
            }
        }

        async function chargerAlertes() {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { data: stocks } = await supabase.from('stocks').select('*').lt('quantite', 10);
            
            const list = document.getElementById('alert-list');
            list.innerHTML = '';

            let hasAlerts = false;

            // 1. Alertes Stocks
            if (stocks && stocks.length > 0) {
                hasAlerts = true;
                stocks.forEach(s => {
                    list.innerHTML += `
                        <div class="alert-card">
                            <div class="alert-icon"><i class="fa-solid fa-boxes-stacked"></i></div>
                            <div class="alert-content">
                                <div class="alert-title">Stock Critique : ${s.produit}</div>
                                <div class="alert-desc">Il ne reste que <strong>${s.quantite}</strong> unités en stock. Seuil d'alerte : ${s.seuil_alerte || 10}.</div>
                            </div>
                            <a href="stocks.html" class="btn" style="background: var(--bg); font-size: 0.8rem;">Gérer</a>
                        </div>
                    `;
                });
            }

            if (!hasAlerts) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 60px; background: white; border-radius: 20px; border: 1px dashed var(--border);">
                        <i class="fa-solid fa-check-circle fa-4x" style="color: var(--secondary); opacity: 0.2; margin-bottom: 20px;"></i>
                        <h2>Tout est sous contrôle</h2>
                        <p style="color: var(--text-light);">Aucune alerte critique n'a été détectée pour le moment.</p>
                    </div>
                `;
            }
        }

        function toggleMobileSidebar() {
            const s = document.querySelector('.sidebar');
            const o = document.getElementById('sidebarOverlay');
            s.classList.toggle('active');
            o.classList.toggle('active');
        }
    </script>
</body>
</html>
