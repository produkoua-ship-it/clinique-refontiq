<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertes - Refontiq</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="assets/premium-style.css" rel="stylesheet">
    <link href="assets/ai-assistant.css" rel="stylesheet">
    
    <script src="assets/role-manager.js"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            }
        })();
    </script>
    <style>
        .alert-card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px; display: flex; align-items: center; gap: 20px; border-left: 5px solid var(--danger); transition: 0.2s; }
        .alert-card:hover { transform: translateX(8px); }
        .alert-icon { width: 50px; height: 50px; border-radius: 12px; background: rgba(231, 111, 81, 0.1); color: var(--danger); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 700; margin-bottom: 4px; }
        .alert-desc { font-size: 0.85rem; color: var(--text-light); }
        .nav-badge { 
            background: var(--danger); 
            color: white; 
            font-size: 0.7rem; 
            font-weight: 700; 
            padding: 2px 8px; 
            border-radius: 10px; 
            margin-left: auto; 
            display: none;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
        <div id="sidebar-container"></div>

        <main class="main-content">
            


            <div class="top-bar">
                <div class="page-title">
                    <h1>Centre d'Alertes</h1>
                    <p>Surveillez les points critiques de la clinique</p>
                </div>
                <div class="top-actions">
                </div>
            </div>

            <div id="alert-list">
                <div style="text-align: center; padding: 60px;">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
                    <p style="margin-top: 15px; color: var(--text-light);">Analyse des données en cours...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initUser();
            await chargerAlertes();
        });

        function initUser() {
            // RoleManager handles user profile
        }

        async function chargerAlertes() {
            const supabase = await window.SupabaseAPI.initSupabase();
            
            // 1. Charger les stocks critiques
            const { data: stocks } = await supabase.from('stocks').select('*').lt('quantite', 10);
            
            // 2. Charger les alertes générales non lues
            const { data: generalAlerts } = await supabase
                .from('alertes')
                .select('*')
                .eq('lu', false)
                .order('created_at', { ascending: false });

            const list = document.getElementById('alert-list');
            list.innerHTML = '';

            let hasAlerts = false;

            // Affichage des alertes de stocks
            if (stocks && stocks.length > 0) {
                hasAlerts = true;
                stocks.forEach(s => {
                    list.innerHTML += `
                        <div class="alert-card">
                            <div class="alert-icon"><i class="fa-solid fa-boxes-stacked"></i></div>
                            <div class="alert-content">
                                <div class="alert-title">Stock Critique : ${s.produit}</div>
                                <div class="alert-desc">Il ne reste que <strong>${s.quantite}</strong> unités en stock. Seuil d'alerte : ${s.seuil_alerte || 10}.</div>
                            </div>
                            <a href="stocks.html" class="btn" style="background: var(--bg); font-size: 0.8rem; color: var(--text);">Gérer</a>
                        </div>
                    `;
                });
            }

            // Affichage des alertes générales
            if (generalAlerts && generalAlerts.length > 0) {
                hasAlerts = true;
                generalAlerts.forEach(a => {
                    const icon = a.type === 'finance' ? 'fa-coins' : 
                                 a.type === 'medical' ? 'fa-stethoscope' : 
                                 'fa-bell';
                    const color = a.priorite === 'haute' ? 'var(--danger)' : 
                                  a.priorite === 'moyenne' ? 'var(--warning)' : 
                                  'var(--primary)';

                    list.innerHTML += `
                        <div class="alert-card" style="border-left-color: ${color}">
                            <div class="alert-icon" style="color: ${color}; background: ${color}1a"><i class="fa-solid ${icon}"></i></div>
                            <div class="alert-content">
                                <div class="alert-title">${a.message}</div>
                                <div class="alert-desc">${new Date(a.created_at).toLocaleString('fr-FR')} - Priorité : ${a.priorite}</div>
                            </div>
                            <button onclick="marquerLue('${a.id}')" class="btn" style="background: var(--bg); font-size: 0.8rem; color: var(--text);">Marquer lue</button>
                        </div>
                    `;
                });
            }

            if (!hasAlerts) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 60px; background: var(--card); border-radius: 20px; border: 1px dashed var(--border);">
                        <i class="fa-solid fa-check-circle fa-4x" style="color: var(--secondary); opacity: 0.2; margin-bottom: 20px;"></i>
                        <h2>Tout est sous contrôle</h2>
                        <p style="color: var(--text-light);">Aucune alerte critique n'a été détectée pour le moment.</p>
                    </div>
                `;
            }
        }

        async function marquerLue(id) {
            const supabase = await window.SupabaseAPI.initSupabase();
            const { error } = await supabase
                .from('alertes')
                .update({ lu: true })
                .eq('id', id);
            
            if (error) {
                console.error('Erreur lors de la mise à jour:', error);
                alert('Impossible de marquer l\'alerte comme lue.');
            } else {
                await chargerAlertes();
            }
        }


        function toggleMobileSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            updateThemeIcon(target);
        }

        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-toggle');
            const icon = btn.querySelector('i');
            if (icon) {
                if (theme === 'dark') {
                    icon.className = 'fa-solid fa-sun';
                    icon.style.color = '#fbbf24';
                } else {
                    icon.className = 'fa-solid fa-moon';
                    icon.style.color = 'var(--text)';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const theme = document.documentElement.getAttribute('data-theme') || 'light';
            updateThemeIcon(theme);
        });
    </script>
</body>
</html>
